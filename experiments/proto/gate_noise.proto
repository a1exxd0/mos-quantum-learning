syntax = "proto3";
package experiments;

import "experiments/proto/common.proto";

message GateNoiseParameters {
  repeated int32 n_range = 1;
  repeated double gate_noise_rates = 2;
  int32 num_trials = 3;
  double epsilon = 4;
}

message GateNoiseExperimentResult {
  ExperimentMetadata metadata = 1;
  GateNoiseParameters parameters = 2;
  repeated TrialResult trials = 3;
}
