syntax = "proto3";
package experiments;

import "experiments/proto/common.proto";

message SoundnessMultiParameters {
  repeated int32 n_range = 1;
  repeated int32 k_range = 2;
  int32 num_trials = 3;
  double epsilon = 4;
  repeated string strategies = 5;
}

message SoundnessMultiExperimentResult {
  ExperimentMetadata metadata = 1;
  SoundnessMultiParameters parameters = 2;
  repeated TrialResult trials = 3;
}
